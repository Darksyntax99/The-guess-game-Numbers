<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number Game</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Guess the Number Game</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="game.html">Game</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
    <div class="container text-center mt-5">

  <h1 class="game-title">Guess The Number</h1>
  <p class="game-subtitle">Choose a number between 1 and 100</p>

  <div class="card game-card mx-auto mt-4">
    <div class="card-body">
<!-- Label for screen readers -->
<label for="guessInput" class="visually-hidden">Enter your guess (1-100)</label>
<input type="number" class="form-control mb-3" id="guessInput" placeholder="Enter your guess">

 <button id="checkBtn" class="btn btn-secondary me-2">Check</button>
<button id="resetBtn" class="btn btn-outline-light">Reset</button>
<!-- Result with aria-live for screen readers -->
      <p class="result mt-3" aria-live="polite">Start guessing...</p>
      <p class="attempts" id="attempts">Attempts: 0</p>

    </div>
  </div>

</div>
<!-- Footer -->
<footer class="bg-dark text-light text-center py-3 mt-auto">
 <p class="mb-1">2026 Guess the Number Game by Darksyntax99.</p> 
 <a href="https://github.com/Darksyntax99/The-guess-game-Numbers" target="_blank"><i class="fa-brands fa-github"></i></a>
 <p class="mb-0">Have fun guessing the number! 🎯</p>
 
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<!-- jQuery Js-->
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="assets/js/game.js"></script>
<!--font awesome-->
<script src="https://kit.fontawesome.com/f2bdfadd7d.js" crossorigin="anonymous"></script>
</body>
</html>
